<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="src/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ground Level Stories</title>
  </head>
  <body>
    <div id="app">
      <div id="primer">
        <select name="stories" id="story-select">
        </select>
        <div id="image-container">
          <div id="image-frame">
            <img class="primer-image" src="" alt="">
          </div>
          <audio class="vocab-audio" controls>
            <source>
          </audio>
        </div>
        <div id="btn-frame">
          <button class="nav-btn" id="backward"><div class="arrow" id="right-arrow"></div></button>
          <button class="nav-btn" id="forward"><div class="arrow" id="left-arrow"></div></button>
        </div>
      </div>

      <div id="player">
        <audio controls id="story">
        </audio>
      </div>

      <div class="review" id="pic-audio">
        <img src="/dictionary/zh/images/公園.jpg" class="review-img">

        <div class="review-answers">
          <audio controls class="review-audio"></audio>
          <audio controls class="review-audio"></audio>
        </div>
      </div>

      <div class="review" id="audio-pic">
        <audio controls class="review-audio"></audio>

        <div class="review-answers">
          <img src="/dictionary/zh/images/貓.jpg" class="review-img">
          <img src="/dictionary/zh/images/手機.jpg" class="review-img">
        </div>
      </div>
    </div>


    <!--Script-->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
